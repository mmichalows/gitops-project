name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Uruchamiaj pipeline tylko po zmianach w głównej gałęzi

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Nadajemy runnerowi uprawnienia do wgrywania paczek do Twojego konta GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Pobranie kodu repozytorium (Checkout)
        uses: actions/checkout@v4

      - name: 2. Logowanie do GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Budowanie i wypychanie obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
